{% extends "base.html" %}

{% block title %}Add Questions{% endblock %}

{% block content %}

<div class="admin-container">

    <div class="admin-card">
        <h2>Add Questions</h2>

        {% if exams %}
        <form method="POST" action="/add_multiple_questions">

            <select name="exam_id" required>
                <option value="">Select Exam</option>
                {% for exam in exams %}
                <option value="{{ exam[0] }}">
                    {{ exam[1] }} (ID: {{ exam[0] }})
                </option>
                {% endfor %}
            </select>

            <div id="questionsContainer">

                <div class="question-block">
                    <textarea name="question_text[]" placeholder="Enter Question" required></textarea>

                    <input type="text" name="option1[]" placeholder="Option 1" required>
                    <input type="text" name="option2[]" placeholder="Option 2" required>
                    <input type="text" name="option3[]" placeholder="Option 3" required>
                    <input type="text" name="option4[]" placeholder="Option 4" required>

                    <input type="text" name="correct_answer[]" placeholder="Correct Answer" required>
                    <hr>
                </div>

            </div>

            <button type="button" onclick="addQuestion()">+ Add Another Question</button>
            <br><br>
            <button type="submit">Save All Questions</button>

        </form>

        {% else %}
            <p>No exams available. Please create an exam first.</p>
        {% endif %}

        <br>
        <a href="/admin">
            <button>Back to Admin</button>
        </a>

    </div>

</div>

<script src="{{ url_for('static', filename='js/admin.js') }}"></script>

{% endblock %}
